appId: com.omninity.operator
productName: Omninity Operator
copyright: "Copyright © 2026 Omninity"

directories:
  buildResources: build
  output: release

files:
  - dist/main.js
  - dist/preload.js
  - node_modules/**/*
  - package.json

extraResources:
  - from: "../omninity-website/dist/public"
    to: "renderer"
    filter:
      - "**/*"
  - from: "assets/tray-icon.png"
    to: "tray-icon.png"

# Output artifact naming — must use ${productName} (not ${name}) to avoid
# the scoped npm package name (@workspace/omninity-desktop) leaking into the
# output path and creating invalid subdirectories inside release/.
artifactName: "${productName}-${version}-${arch}.${ext}"

asar: true
# npmRebuild rebuilds native modules for the Electron ABI before packaging,
# which is correct for the packaged app but breaks the shared pnpm store for
# the rest of the monorepo.  package.mjs compensates by backing up the
# Node.js-ABI binary before running electron-builder and restoring it after.
npmRebuild: true
# forceCodeSigning: false keeps electron-builder from aborting when no
# signing identity is available.  Signing is an opt-in release step (task #218).
forceCodeSigning: false

mac:
  category: public.app-category.productivity
  # identity: null is the canonical electron-builder way to explicitly skip
  # macOS code signing even when a Developer ID certificate exists in Keychain.
  # Combine with CSC_IDENTITY_AUTO_DISCOVERY=false (set in package.mjs) for a
  # fully unsigned dev build.  To enable signing for release, remove this line
  # and set CSC_LINK + CSC_KEY_PASSWORD environment variables.
  identity: null
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  # notarize: false — skip Apple notarisation (requires identity + creds).
  notarize: false

dmg:
  title: "Omninity Operator ${version}"
  # Produces: Omninity Operator-0.0.1.dmg  (no arch suffix for universal DMG)
  artifactName: "${productName}-${version}.${ext}"

win:
  # Windows code signing is disabled by not providing CSC_LINK / WIN_CSC_LINK.
  # CSC_IDENTITY_AUTO_DISCOVERY=false (set in package.mjs) prevents accidental
  # cert auto-discovery.  To enable signing, set WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD.
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
  # Conventional Windows installer naming: "Omninity Operator Setup 0.0.1.exe"
  artifactName: "${productName} Setup ${version}.${ext}"

linux:
  maintainer: "Omninity <support@omninity.app>"
  # executableName must be lowercase without spaces for .deb packaging rules
  executableName: omninity-operator
  # Default target is `dir` (unpacked directory) — fast and suitable for CI.
  # To produce a .deb installer run: node package.mjs linux:deb
  target:
    - target: dir
  category: Utility

deb:
  packageName: omninity-operator

publish:
  provider: generic
  url: "https://releases.omninity.app/desktop"
