appId: com.omninity.operator
productName: Omninity Operator
copyright: "Copyright © 2026 Omninity"

directories:
  buildResources: build
  output: release

files:
  - dist/main.js
  - dist/preload.js
  - node_modules/**/*
  - package.json

extraResources:
  - from: "../omninity-website/dist/public"
    to: "renderer"
    filter:
      - "**/*"
  - from: "assets/tray-icon.png"
    to: "tray-icon.png"

asar: true
# npmRebuild rebuilds native modules for the Electron ABI before packaging,
# which is correct for the packaged app but breaks the shared pnpm store for
# the rest of the monorepo.  The build scripts compensate by running
# `pnpm -w rebuild better-sqlite3` immediately after electron-builder to
# restore the Node.js-ABI binary for the dev server.
npmRebuild: true
forceCodeSigning: false

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false

dmg:
  title: "Omninity Operator ${version}"

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  deleteAppDataOnUninstall: false

linux:
  maintainer: "Omninity <support@omninity.app>"
  target:
    - target: dir
    - target: deb
  category: Utility

publish:
  provider: generic
  url: "https://releases.omninity.app/desktop"
