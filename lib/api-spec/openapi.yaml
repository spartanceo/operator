      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: taskId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
