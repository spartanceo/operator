            application/json:
              schema: { $ref: '#/components/schemas/PrivateRegistrySettingsResponse' }
  /admin/enterprise/private-registry/sync:
    post:
      operationId: syncPrivateRegistryFromRemote
      tags: [private-registry]
      summary: Pull the manifest from the configured remote registry
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Sync result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateRegistrySyncResponse' }
  /admin/enterprise/private-registry/packages:
    get:
      operationId: listPrivateSkillPackages
      tags: [private-registry]
      summary: List packages in the org-private registry
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected, superseded, all]
        - name: latestOnly
          in: query
          required: false
          schema: { type: boolean }
      responses:
        '200':
          description: Page of packages
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateSkillPackagePageResponse' }
    post:
      operationId: submitPrivateSkillPackage
      tags: [private-registry]
      summary: Submit a new private skill package version for review
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubmitPrivateSkillPackageRequest' }
      responses:
        '201':
          description: Package created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateSkillPackageResponse' }
  /admin/enterprise/private-registry/packages/{id}/approve:
    post:
      operationId: approvePrivateSkillPackage
      tags: [private-registry]
      summary: Approve a pending package
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string }
      responses:
        '200':
          description: Approved package
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateSkillPackageResponse' }
  /admin/enterprise/private-registry/packages/{id}/reject:
    post:
      operationId: rejectPrivateSkillPackage
      tags: [private-registry]
      summary: Reject a pending package
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Rejected package
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateSkillPackageResponse' }
  /admin/enterprise/private-registry/packages/{id}/push:
    post:
      operationId: pushPrivateSkillPackage
      tags: [private-registry]
      summary: Push an approved package to every active seat
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Push result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateSkillPushResponse' }
  /skills/private:
    get:
      operationId: listVisiblePrivateSkills
      tags: [private-registry]
      summary: List private skills visible to the calling member
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Visible packages
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateSkillPackageListResponse' }
  /skills/private/installed:
    get:
      operationId: listInstalledPrivateSkills
      tags: [private-registry]
      summary: List private-skill installations for the caller's tenant
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Installations
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateSkillInstallationListResponse' }
  /skills/private/{id}/install:
    post:
      operationId: installPrivateSkill
      tags: [private-registry]
      summary: Install a private skill package for the caller's tenant
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '201':
          description: Installation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateSkillInstallationResponse' }
  /skills/private/{slug}:
    delete:
      operationId: uninstallPrivateSkill
      tags: [private-registry]
      summary: Uninstall a private skill (blocked when mandatory)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Removal result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivateSkillRemovalResponse' }
components:
  parameters:
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: true
      description: |
        Tenant identifier. Replaced by JWT-derived context once full SSO
        ships — until then this header is the request's tenant context.
      schema:
        type: string
    CursorParam:
      name: cursor
      in: query
      required: false
      description: Opaque cursor returned by the previous page.
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      required: false
      description: Page size, default 20, max 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    MdmConfigField:
      type: object
      required:
        - key
        - kind
        - label
        - lockable
      properties:
        key:
          type: string
        kind:
          type: string
          enum:
            - boolean
            - string
            - url
            - enum
            - string-list
        label:
          type: string
        description:
          type: string
        defaultValue:
          nullable: true
        lockable:
          type: boolean
        options:
          type: array
          items:
            type: string
        plistKey:
          type: string
        registryName:
          type: string
    MdmSchemaResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          required:
            - fields
          properties:
            fields:
              type: array
              items:
                $ref: '#/components/schemas/MdmConfigField'
    MdmProfileView:
      type: object
      required:
        - id
        - source
        - organisationName
        - profileVersion
        - values
        - lockedKeys
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        source:
          type: string
          enum:
            - manual
            - jamf
            - intune
            - gpo
            - sccm
        organisationName:
          type: string
        profileVersion:
          type: integer
        values:
          type: object
          additionalProperties: true
        lockedKeys:
          type: array
          items:
            type: string
        lastAppliedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MdmProfileResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          required:
            - profile
          properties:
            profile:
              nullable: true
              allOf:
                - $ref: '#/components/schemas/MdmProfileView'
    MdmUpsertProfileRequest:
      type: object
      required:
        - organisationName
      properties:
        source:
          type: string
          enum:
            - manual
            - jamf
            - intune
            - gpo
            - sccm
        organisationName:
          type: string
          minLength: 1
          maxLength: 256
        profileVersion:
          type: integer
          minimum: 1
        values:
          type: object
          additionalProperties: true
        lockedKeys:
          type: array
          items:
            type: string
    MdmProfileRemovedResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          required:
            - removed
          properties:
            removed:
              type: boolean
    MdmEffectiveSetting:
      type: object
      required:
        - key
        - value
        - source
        - locked
      properties:
        key:
          type: string
        value:
          nullable: true
        source:
          type: string
          enum:
            - default
            - mdm
        locked:
          type: boolean
    MdmEffectiveSettingsResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          type: object
          required:
            - managed
            - settings
          properties:
            managed:
              type: boolean
            organisationName:
              type: string
              nullable: true
            profileVersion:
              type: integer
              nullable: true
            settings:
              type: array
              items:
                $ref: '#/components/schemas/MdmEffectiveSetting'
    MdmInstallerArtifact:
      type: object
      required:
        - id
        - platform
        - kind
        - filename
      properties:
        id:
          type: string
        platform:
          type: string
          enum:
            - darwin
            - win32
            - linux
        kind:
          type: string
