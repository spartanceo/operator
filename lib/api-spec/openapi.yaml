    UpdateCheck:
      type: object
      required:
        - currentVersion
        - latestVersion
        - updateAvailable
        - channel
        - checkedAt
        - pinned
        - inRollout
      properties:
        currentVersion:
          type: string
        latestVersion:
          type: string
        updateAvailable:
          type: boolean
        channel:
          type: string
          description: Release channel — `stable`, `beta`, etc.
        downloadUrl:
          type: string
          nullable: true
        releaseNotes:
          type: string
          nullable: true
        checkedAt:
          type: string
          format: date-time
        pinned:
          type: boolean
          description: True iff the tenant has version pinning or auto-update opt-out enabled.
        pinnedVersion:
          type: string
          nullable: true
        inRollout:
          type: boolean
          description: |
            True iff the tenant fell inside the staged-rollout window for
            the latest release. Bucketing is deterministic per tenant +
            version (sha-256 modulo 100), so a release at 20% rollout
            admits the same 20% of tenants on every check.
        rolloutPercentage:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        manifest:
          $ref: '#/components/schemas/UpdateReleaseManifest'
          nullable: true
    UpdateCheckResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/UpdateCheck'
