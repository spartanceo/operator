            application/json:
              schema:
                $ref: '#/components/schemas/SkillResponse'
    delete:
      operationId: deleteSkill
      tags:
        - skills
      summary: Delete a skill
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deletion receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDeleteResponse'
  /skills/{id}/export:
    get:
      operationId: exportSkill
