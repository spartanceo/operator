openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: |
    Omninity Operator HTTP API.

    Every 2xx response conforms to the canonical envelope shape defined in
    `Standard 1` of the bug-prevention standards: `{ success, data, error }`.
    Collection endpoints further wrap their payload in
    `{ items, nextCursor }` per `Standard 13`.

    Tenant context is supplied via the `X-Tenant-ID` header until session
    cookies replace it on `/api/auth/login`.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health and readiness probes
  - name: admin
    description: Tenant-administration endpoints (GDPR data export / erasure)
  - name: auth
    description: Local authentication (bcrypt + session cookie)
  - name: models
    description: Local Ollama model lifecycle
  - name: chat
    description: Single-turn chat with the active model
  - name: agent
    description: Deterministic agent loop (Router / Planner / Executor / Verifier / Research / Memory)
  - name: tools
    description: Tool catalog and direct invocation
  - name: privacy
    description: Privacy-event audit log
  - name: memory
    description: Long-lived user memories
  - name: files
    description: Workspace-sandboxed file operations
  - name: browser
    description: Local browser automation (Tier 1 stubs)
  - name: onboarding
    description: First-run setup wizard, hardware probe, and starter-task suggestions
  - name: updates
    description: Desktop application update channel
  - name: desktop
    description: Desktop control agent — Look-Act-Verify with semantic targeting
  - name: knowledge
    description: Personal knowledge base / second brain (collections, documents, semantic search, RAG)
  - name: media
    description: Local media generation (image / audio / video) — Tier 1 deterministic stubs
  - name: comm
    description: Connected accounts, email, calendar, VoIP, contacts, outreach
  - name: mobile
    description: Mobile Companion PWA — pairing, devices, push notifications, mobile dashboard
  - name: telemetry
    description: Opt-in analytics, performance metrics, crash reports, and the per-tenant dashboard
  - name: distribution
    description: Platform distribution — code-signing attestation and OS permission flows
  - name: legal
    description: Legal documents, acceptance ledger, model licences, incident reports, age confirmation
  - name: diagnostics
    description: Local error log, disk-health probe, and the user-facing error catalog (Task
  - name: undo
    description: Undo stack for desktop / file actions (Task
  - name: workspaces
    description: Workspace switcher — create, rename, delete, customise, overview, template export/import (Task #42)
  - name: tasks
    description: Multi-task queue, priority controls, and concurrent task management (Task #38)
paths:
  /healthz:
    get:
      operationId: healthCheckLegacy
      tags:
        - health
      summary: Legacy health probe (kept for back-compat)
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
  /health:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health probe
      description: |
        Returns server health status. Always responds 200; payload reports
        the running version and the current server time so callers can detect
        clock skew.
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
  /admin/tenant-data:
    get:
      operationId: exportTenantData
      tags:
        - admin
      summary: Export the requesting tenant's data (GDPR portability)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Tenant data snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDataExportResponse'
        '404':
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: eraseTenantData
      tags:
        - admin
      summary: Erase the requesting tenant's data (GDPR erasure)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Erasure scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantErasureResponse'
        '404':
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /auth/register:
    post:
      operationId: registerUser
      tags:
        - auth
      summary: Bootstrap a new tenant + owner user
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: User created and signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
  /auth/login:
    post:
      operationId: loginUser
      tags:
        - auth
      summary: Sign in with email + password
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in; session cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /auth/logout:
    post:
      operationId: logoutUser
      tags:
        - auth
      summary: Destroy the current session
      responses:
        '200':
          description: Session destroyed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutResponse'
  /auth/me:
    get:
      operationId: getCurrentUser
      tags:
        - auth
      summary: Return the signed-in user (singleton)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /models:
    get:
      operationId: listModels
      tags:
        - models
      summary: List Ollama models known to this installation
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Models page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
  /models/pull:
    post:
      operationId: pullModel
      tags:
        - models
      summary: Schedule download of a named model
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelPullRequest'
      responses:
        '200':
          description: Pull scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelPullResponse'
  /models/{name}:
    get:
      operationId: getModel
      tags:
        - models
      summary: Fetch one model's status (singleton)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelGetResponse'
        '404':
          description: Unknown model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /chat:
    post:
      operationId: chat
      tags:
        - chat
      summary: Single-turn chat completion via the local Ollama model
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Assistant message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
  /conversations:
    get:
      operationId: listConversations
      tags:
        - chat
      summary: List conversations (sidebar)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
        - name: archivedOnly
          in: query
          required: false
          schema:
            type: boolean
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: ISO date — only conversations active on or after this timestamp.
          schema:
            type: string
            format: date-time
        - name: agentOnly
          in: query
          required: false
          description: Only conversations that ran the agent at least once.
          schema:
            type: boolean
        - name: desktopOnly
          in: query
          required: false
          description: Only conversations whose desktop control was invoked.
          schema:
            type: boolean
      responses:
        '200':
          description: Conversations page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'
    post:
      operationId: createConversation
      tags:
        - chat
      summary: Create a new conversation thread
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
  /conversations/search:
    get:
      operationId: searchConversations
      tags:
        - chat
      summary: Full-text search across messages and runs
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Search hits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationSearchResponse'
  /conversations/{id}:
    get:
      operationId: getConversation
      tags:
        - chat
      summary: Fetch one conversation
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    patch:
      operationId: updateConversation
      tags:
        - chat
      summary: Rename, pin, archive, or set agent mode
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConversationRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: deleteConversation
      tags:
        - chat
      summary: Permanently delete a conversation and its dependents
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteConversationResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /conversations/{id}/messages:
    get:
      operationId: listConversationMessages
      tags:
        - chat
      summary: Conversation transcript
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Messages page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationMessageListResponse'
    post:
      operationId: appendConversationMessage
      tags:
        - chat
      summary: Append a chat-mode message turn to a conversation
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendConversationMessageRequest'
      responses:
        '200':
          description: Appended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppendConversationMessageResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /conversations/{id}/export:
    get:
      operationId: exportConversation
      tags:
        - chat
      summary: Export a conversation as markdown or JSON
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum:
              - markdown
              - json
              - pdf
            default: markdown
      responses:
        '200':
          description: Export payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationExportResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /agent/runs:
    get:
      operationId: listAgentRuns
      tags:
        - agent
      summary: List recent agent runs in this workspace
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Agent runs page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunListResponse'
    post:
      operationId: createAgentRun
      tags:
        - agent
      summary: Kick off a new deterministic agent run
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRunRequest'
      responses:
        '200':
          description: Agent run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
  /agent/runs/{id}:
    get:
      operationId: getAgentRun
      tags:
        - agent
      summary: Fetch one agent run by id
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
        '404':
          description: Unknown run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /agent/runs/{id}/cancel:
    post:
      operationId: cancelAgentRun
      tags:
        - agent
      summary: Cancel a running agent
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunResponse'
  /agent/runs/{id}/messages:
    get:
      operationId: listAgentRunMessages
      tags:
        - agent
      summary: Conversation messages for one run
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Messages page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
  /agent/runs/{id}/tool-calls:
    get:
      operationId: listAgentRunToolCalls
      tags:
        - agent
      summary: Tool calls executed inside one run
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Tool calls page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolCallListResponse'
  /agent/runs/{id}/approvals:
    get:
      operationId: listAgentRunApprovals
      tags:
        - agent
      summary: Approval gates for one run
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Approvals page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalListResponse'
  /agent/approvals/{id}/decide:
    post:
      operationId: decideApproval
      tags:
        - agent
      summary: Approve or deny a pending approval gate
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
  /tools:
    get:
      operationId: listTools
      tags:
        - tools
      summary: List installed tools
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Tools page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolListResponse'
  /tools/{name}/invoke:
    post:
      operationId: invokeTool
      tags:
        - tools
      summary: Directly invoke a tool (outside an agent run)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolInvokeRequest'
      responses:
        '200':
          description: Tool output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolInvokeResponse'
  /privacy/events:
    get:
      operationId: listPrivacyEvents
      tags:
        - privacy
      summary: Browse the privacy-event audit log
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Privacy events page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyEventListResponse'
    post:
      operationId: createPrivacyEvent
      tags:
        - privacy
      summary: Manually log a privacy event
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrivacyEventRequest'
      responses:
        '200':
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyEventResponse'
  /notifications:
    get:
      operationId: listNotifications
      tags:
        - notifications
      summary: List in-app notifications (newest first)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Notifications page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
    post:
      operationId: createNotification
      tags:
        - notifications
      summary: Create a notification
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationRequest'
      responses:
        '200':
          description: Notification created (or null when suppressed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCreateResponse'
  /notifications/unread-count:
    get:
      operationId: getNotificationUnreadCount
      tags:
        - notifications
      summary: Bell-badge unread count
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationUnreadCountResponse'
  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags:
        - notifications
      summary: Mark a single notification as read
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags:
        - notifications
      summary: Mark every unread notification as read
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Updated count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationBulkUpdateResponse'
  /notifications/clear:
    post:
      operationId: clearNotifications
      tags:
        - notifications
      summary: Delete every notification (with confirmation in UI)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Deleted count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationBulkDeleteResponse'
  /notifications/preferences:
    get:
      operationId: getNotificationPreferences
      tags:
        - notifications
      summary: Per-category notification preferences
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesResponse'
    put:
      operationId: updateNotificationPreferences
      tags:
        - notifications
      summary: Update notification preferences
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferencesUpdateRequest'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesResponse'
  /notifications/dispatch-claim:
    post:
      operationId: claimNotificationDispatch
      tags:
        - notifications
      summary: Atomically claim undispatched rows for native OS dispatch
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Newly-claimed notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationClaimResponse'
  /activity/events:
    get:
      operationId: listActivityEvents
      tags:
        - activity
      summary: Paginated activity feed
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: eventType
          in: query
          required: false
          schema:
            type: string
