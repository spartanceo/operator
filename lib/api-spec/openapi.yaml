          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillExportResponse'
components:
  parameters:
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: true
      description: |
        Tenant identifier. Replaced by JWT-derived context once full SSO
        ships — until then this header is the request's tenant context.
      schema:
        type: string
    CursorParam:
      name: cursor
      in: query
      required: false
      description: Opaque cursor returned by the previous page.
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      required: false
      description: Page size, default 20, max 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    HealthStatus:
      type: object
      required:
        - status
        - version
        - time
      properties:
        status:
          type: string
          enum:
            - ok
        version:
          type: string
        time:
          type: string
          format: date-time
    HealthCheckResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/HealthStatus'
    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ApiErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          enum:
            - false
        error:
          $ref: '#/components/schemas/ApiError'
    TenantDataExport:
      type: object
      required:
        - tenant
        - workspaces
        - exportedAt
      properties:
        tenant:
          type: object
          required:
            - id
            - name
            - status
            - createdAt
          properties:
            id:
              type: string
            name:
              type: string
            status:
              type: string
            createdAt:
              type: string
              format: date-time
        workspaces:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - createdAt
            properties:
              id:
                type: string
              name:
                type: string
              createdAt:
                type: string
                format: date-time
        exportedAt:
          type: string
          format: date-time
    TenantDataExportResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/TenantDataExport'
    TenantErasureReceipt:
      type: object
      required:
        - tenantId
        - status
        - scheduledAt
      properties:
        tenantId:
          type: string
        status:
          type: string
          enum:
            - erased
        scheduledAt:
          type: string
          format: date-time
    TenantErasureResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          enum:
            - true
        data:
          $ref: '#/components/schemas/TenantErasureReceipt'
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - displayName
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        displayName:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthUser:
      type: object
      required:
        - id
        - email
        - displayName
        - role
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
    AuthSession:
