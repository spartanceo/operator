          schema:
            type: string
        - name: installed
          in: query
          required: false
          schema:
            type: boolean
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Skills page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillListResponse'
    post:
      operationId: createSkill
