        - required
      properties:
        key:
          type: string
          description: Stable identifier — `[a-zA-Z][a-zA-Z0-9_]{0,63}`.
        type:
          $ref: '#/components/schemas/SkillConfigFieldType'
        label:
          type: string
        description:
          type: string
        required:
          type: boolean
        defaultValue:
          oneOf:
            - type: string
            - type: number
