      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueSetPriorityRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuedTaskResponse"
        "404":
          description: Unknown task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /undo/tasks/{taskId}/actions:
    get:
      operationId: listUndoTaskActions
