openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: |
    Omninity Operator HTTP API.

    Every 2xx response conforms to the canonical envelope shape defined in
    `Standard 1` of the bug-prevention standards: `{ success, data, error }`.
    Collection endpoints further wrap their payload in
    `{ items, nextCursor }` per `Standard 13`.

    Tenant context is supplied via the `X-Tenant-ID` header until session
    cookies replace it on `/api/auth/login`.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health and readiness probes
  - name: admin
    description: Tenant-administration endpoints (GDPR data export / erasure)
  - name: auth
    description: Local authentication (bcrypt + session cookie)
  - name: models
    description: Local Ollama model lifecycle
  - name: chat
    description: Single-turn chat with the active model
  - name: agent
    description: Deterministic agent loop (Router / Planner / Executor / Verifier / Research / Memory)
  - name: tools
    description: Tool catalog and direct invocation
  - name: privacy
    description: Privacy-event audit log
  - name: memory
    description: Long-lived user memories
  - name: files
    description: Workspace-sandboxed file operations
  - name: browser
    description: Local browser automation (Tier 1 stubs)
  - name: onboarding
    description: First-run setup wizard, hardware probe, and starter-task suggestions
  - name: integrations
    description: Third-party platform integrations (Notion, Slack, GitHub, etc.)
  - name: updates
    description: Desktop application update channel
  - name: desktop
    description: Desktop control agent — Look-Act-Verify with semantic targeting
  - name: knowledge
    description: Personal knowledge base / second brain (collections, documents, semantic search, RAG)
  - name: media
    description: Local media generation (image / audio / video) — Tier 1 deterministic stubs
  - name: comm
    description: Connected accounts, email, calendar, VoIP, contacts, outreach
  - name: mobile
    description: Mobile Companion PWA — pairing, devices, push notifications, mobile dashboard
  - name: telemetry
    description: Opt-in analytics, performance metrics, crash reports, and the per-tenant dashboard
  - name: distribution
    description: Platform distribution — code-signing attestation and OS permission flows
  - name: mdm
    description: |
      Enterprise Mobile Device Management — per-tenant configuration profiles
      (.mobileconfig / Registry / ADMX), Jamf + Intune installer catalog,
      and fleet status beacons surfaced on the Enterprise Admin portal.
  - name: legal
    description: Legal documents, acceptance ledger, model licences, incident reports, age confirmation
  - name: diagnostics
    description: Local error log, disk-health probe, and the user-facing error catalog (Task
  - name: undo
    description: Undo stack for desktop / file actions (Task
  - name: workspaces
    description: Workspace switcher — create, rename, delete, customise, overview, template export/import (Task #42)
  - name: tasks
    description: Multi-task queue, priority controls, and concurrent task management (Task #38)
  - name: task-templates
    description: Reusable task templates — save / browse / run / export parameterised prompts and quick-launch pins (Task #46)
  - name: schedules
    description: Scheduled & recurring tasks (Task #45 — cron-driven autonomous task runs, NL parser, schedule history, global pause)
  - name: plugins
    description: Developer SDK — register custom tools that integrate with the agent loop (Task #14)
  - name: webhooks
    description: Developer SDK — outbound webhook subscriptions for the local event bus (Task #14)
  - name: events
    description: Developer SDK — recent in-process events for polling clients (Task #14)
  - name: system-integration
    description: Global hotkey, quick-input overlay, menu bar / system tray, right-click "Ask OP" services, focus-mode awareness, login-item registration (Task #52)
  - name: backup
    description: Local-first encrypted backup, restore, scheduling, and cloud-sync stub
  - name: export
    description: Per-domain data-portability exports (conversations, memories, settings)
  - name: recovery
    description: Crash recovery & mid-task resumption (Task #58 — checkpoints, interrupted-task detection, resume / discard / partial-undo, clean-shutdown registration)
paths:
  /healthz:
    get:
      operationId: healthCheckLegacy
      tags:
        - health
      summary: Legacy health probe (kept for back-compat)
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
  /health:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health probe
      description: |
        Returns server health status. Always responds 200; payload reports
        the running version and the current server time so callers can detect
        clock skew.
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
  /admin/tenant-data:
    get:
      operationId: exportTenantData
      tags:
        - admin
      summary: Export the requesting tenant's data (GDPR portability)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Tenant data snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDataExportResponse'
        '404':
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: eraseTenantData
      tags:
        - admin
      summary: Erase the requesting tenant's data (GDPR erasure)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Erasure scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantErasureResponse'
        '404':
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /admin/super/overview:
    get:
      operationId: getSuperAdminOverview
      tags: [admin]
      summary: Platform-wide aggregate counts (anonymised)
      responses:
        '200':
          description: Overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuperAdminOverviewResponse'
  /admin/super/revenue:
    get:
      operationId: getSuperAdminRevenue
      tags: [admin]
      summary: Revenue, MRR, platform/creator split
      responses:
        '200':
          description: Revenue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuperAdminRevenueResponse'
  /admin/super/skill-analytics:
    get:
      operationId: getSuperAdminSkillAnalytics
      tags: [admin]
      summary: Top skills, creators, trending categories
      responses:
        '200':
          description: Analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuperAdminSkillAnalyticsResponse'
  /admin/super/moderation/queue:
    get:
      operationId: listModerationQueue
      tags: [admin]
      summary: Skill submissions awaiting review
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Queue page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationQueuePageResponse'
  /admin/super/moderation/{id}/approve:
    post:
      operationId: approveModerationItem
      tags: [admin]
      summary: Approve a queued skill submission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string }
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBoolResponse'
  /admin/super/moderation/{id}/reject:
    post:
      operationId: rejectModerationItem
      tags: [admin]
      summary: Reject a queued skill submission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBoolResponse'
  /admin/super/moderation/store/{id}/remove:
    post:
      operationId: removeStoreSkill
      tags: [admin]
      summary: Take down a published store skill
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBoolResponse'
  /admin/super/creators:
    get:
      operationId: listCreators
      tags: [admin]
      summary: All creator accounts (paginated)
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Page of creators
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatorPageResponse'
  /admin/super/creators/{id}/ban:
    post:
      operationId: banCreator
      tags: [admin]
      summary: Ban a creator account
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Banned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBoolResponse'
  /admin/super/feature-flags:
    get:
      operationId: listFeatureFlags
      tags: [admin]
      summary: List all feature flags
      responses:
        '200':
          description: Flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlagsListResponse'
  /admin/super/feature-flags/{key}:
    put:
      operationId: setFeatureFlag
      tags: [admin]
      summary: Create or update a feature flag
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
                segment: { type: string }
                description: { type: string }
                rolloutPercent: { type: integer, minimum: 0, maximum: 100 }
      responses:
        '200':
          description: Upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlagResponse'
  /admin/super/versions:
    get:
      operationId: listAppVersions
      tags: [admin]
      summary: List recent desktop releases
      responses:
        '200':
          description: Versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersionsListResponse'
    post:
      operationId: publishAppVersion
      tags: [admin]
      summary: Publish a new desktop release
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [versionString]
              properties:
                versionString: { type: string }
                channel: { type: string }
                isCurrent: { type: boolean }
                isMinRequired: { type: boolean }
                notes: { type: string }
      responses:
        '200':
          description: Published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersionResponse'
  /admin/super/versions/current:
    get:
      operationId: getCurrentAppVersion
      tags: [admin]
      summary: Current release on a channel
      parameters:
        - name: channel
          in: query
          required: false
          schema: { type: string, default: stable }
      responses:
        '200':
          description: Current version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersionResponse'
        '404':
          description: No current version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /admin/super/abuse:
    get:
      operationId: listAbuseReports
      tags: [admin]
      summary: Abuse reports (filterable by status)
      parameters:
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [open, resolved, dismissed] }
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbuseReportPageResponse'
    post:
      operationId: createAbuseReport
      tags: [admin]
      summary: File an abuse report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetType, targetId, reason]
              properties:
                targetType: { type: string }
                targetId: { type: string }
                targetLabel: { type: string }
                reason: { type: string }
                severity: { type: string }
                reporterLabel: { type: string }
      responses:
        '200':
          description: Report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbuseReportResponse'
  /admin/super/abuse/{id}/resolve:
    post:
      operationId: resolveAbuseReport
      tags: [admin]
      summary: Resolve or dismiss an abuse report
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [resolved, dismissed] }
                notes: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBoolResponse'
  /admin/enterprise/org:
    get:
      operationId: getEnterpriseOrg
      tags: [admin]
      summary: Get the calling tenant's enterprise org row
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Org
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseOrgResponse'
    patch:
      operationId: updateEnterpriseOrg
      tags: [admin]
      summary: Update org branding / SSO / plan
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                logoUrl: { type: string, nullable: true }
                primaryColor: { type: string }
                plan: { type: string }
                seatLimit: { type: integer }
                airGapped: { type: boolean }
                ssoProvider: { type: string, nullable: true }
                ssoDomain: { type: string, nullable: true }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseOrgResponse'
  /admin/enterprise/seats:
    get:
      operationId: listEnterpriseSeats
      tags: [admin]
      summary: List seats for the calling tenant
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseSeatPageResponse'
    post:
      operationId: inviteEnterpriseSeat
      tags: [admin]
      summary: Invite a new seat (returns 409 when limit exceeded)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
                displayName: { type: string }
                role: { type: string, enum: [admin, standard, readonly] }
      responses:
        '200':
          description: Invited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseSeatResponse'
        '409':
          description: Seat limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /admin/enterprise/seats/{id}:
    patch:
      operationId: updateEnterpriseSeat
      tags: [admin]
      summary: Update a seat's role or status
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string }
                status: { type: string }
                displayName: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseSeatResponse'
    delete:
      operationId: removeEnterpriseSeat
      tags: [admin]
      summary: Remove a seat
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBoolResponse'
  /admin/enterprise/whitelist:
    get:
      operationId: getEnterpriseWhitelist
      tags: [admin]
      summary: Get the org's skill whitelist
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: List
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhitelistListResponse'
  /admin/enterprise/whitelist/{slug}:
    put:
      operationId: setEnterpriseWhitelistEntry
      tags: [admin]
      summary: Allow / block a skill for the org
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [allowed]
              properties:
                allowed: { type: boolean }
                skillName: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhitelistEntryResponse'
  /admin/enterprise/audit:
    get:
      operationId: listEnterpriseAudit
      tags: [admin]
      summary: List org audit-log entries
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseAuditPageResponse'
  /admin/enterprise/audit/export.csv:
    get:
      operationId: exportEnterpriseAuditCsv
      tags: [admin]
      summary: Download the audit log as CSV
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: CSV
          content:
            text/csv:
              schema: { type: string }
  /admin/enterprise/audit/v2:
    get:
      operationId: listEnterpriseAuditV2
      tags: [admin]
      summary: Compliance-grade filterable audit log (Task #53)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - { name: actionType, in: query, required: false, schema: { type: string } }
        - { name: action, in: query, required: false, schema: { type: string } }
        - { name: actor, in: query, required: false, schema: { type: string } }
        - { name: agentId, in: query, required: false, schema: { type: string } }
        - { name: userId, in: query, required: false, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: integer } }
        - { name: until, in: query, required: false, schema: { type: integer } }
        - { name: q, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          description: Page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseAuditPageResponse'
  /admin/enterprise/audit/verify:
    get:
      operationId: verifyEnterpriseAuditChain
      tags: [admin]
      summary: Walk the audit hash chain end-to-end and report integrity
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditVerifyResponse'
  /admin/enterprise/audit/export.json:
    post:
      operationId: exportEnterpriseAuditSignedJson
      tags: [admin]
      summary: Download the filtered audit log as a signed JSON bundle (POST keeps the secret out of the URL)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                secret: { type: string, minLength: 16 }
                actionType: { type: string, nullable: true }
                since: { type: integer }
                until: { type: integer }
                max: { type: integer }
      responses:
        '200':
          description: Signed JSON export
          content:
            application/json:
              schema: { type: object }
        '400':
          description: Missing or weak secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /admin/enterprise/audit/scheduler/tick:
    post:
      operationId: tickEnterpriseAuditScheduler
      tags: [admin]
      summary: Run the daily retention purge across every tenant
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditSchedulerTickResponse'
  /admin/enterprise/audit/retention:
    get:
      operationId: getEnterpriseAuditRetention
      tags: [admin]
      summary: Read the audit-log retention policy
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditRetentionResponse'
    put:
      operationId: setEnterpriseAuditRetention
      tags: [admin]
      summary: Update the audit-log retention window (in days)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [retentionDays]
              properties:
                retentionDays: { type: integer, minimum: 7, maximum: 3650 }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditRetentionResponse'
  /admin/enterprise/audit/purge:
    post:
      operationId: purgeEnterpriseAuditLog
      tags: [admin]
      summary: Manually purge audit entries older than the retention window
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm: { type: string, enum: [PURGE] }
      responses:
        '200':
          description: Purge result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditPurgeResponse'
  /admin/enterprise/audit/alert-rules:
    get:
      operationId: listEnterpriseAuditAlertRules
      tags: [admin]
      summary: List audit alert rules
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditAlertRuleListResponse'
    post:
      operationId: createEnterpriseAuditAlertRule
      tags: [admin]
      summary: Create an audit alert rule
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, thresholdCount, windowSeconds]
              properties:
                name: { type: string }
                actionType: { type: string, nullable: true }
                actor: { type: string, nullable: true }
                thresholdCount: { type: integer, minimum: 1, maximum: 100000 }
                windowSeconds: { type: integer, minimum: 1, maximum: 86400 }
                enabled: { type: boolean }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditAlertRuleResponse'
  /admin/enterprise/audit/alert-rules/{id}:
    patch:
      operationId: updateEnterpriseAuditAlertRule
      tags: [admin]
      summary: Update an audit alert rule
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - { name: id, in: path, required: true, schema: { type: string } }
