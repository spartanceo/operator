            $ref: '#/components/schemas/SkillConfigValue'
          description: Non-sensitive values keyed by field key.
        secretRefs:
          type: array
          items:
            type: string
          description: Sensitive field keys whose value is sealed in the vault.
        required:
          type: array
          items:
            type: string
        missingRequired:
          type: array
          items:
            type: string
        configured:
          type: boolean
        configuredAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
