openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: |
    Omninity Operator HTTP API.

    Every 2xx response conforms to the canonical envelope shape defined in
    `Standard 1` of the bug-prevention standards: `{ success, data, error }`.
    Collection endpoints further wrap their payload in
    `{ items, nextCursor }` per `Standard 13`.

    Tenant context is supplied via the `X-Tenant-ID` header until session
    cookies replace it on `/api/auth/login`.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health and readiness probes
  - name: admin
    description: Tenant-administration endpoints (GDPR data export / erasure)
  - name: auth
    description: Local authentication (bcrypt + session cookie)
  - name: models
    description: Local Ollama model lifecycle
  - name: chat
    description: Single-turn chat with the active model
  - name: agent
    description: Deterministic agent loop (Router / Planner / Executor / Verifier / Research / Memory)
  - name: tools
    description: Tool catalog and direct invocation
  - name: privacy
    description: Privacy-event audit log
  - name: memory
    description: Long-lived user memories
  - name: files
    description: Workspace-sandboxed file operations
  - name: browser
    description: Local browser automation (Tier 1 stubs)
  - name: onboarding
    description: First-run setup wizard, hardware probe, and starter-task suggestions
  - name: updates
    description: Desktop application update channel
  - name: desktop
    description: Desktop control agent — Look-Act-Verify with semantic targeting
  - name: knowledge
    description: Personal knowledge base / second brain (collections, documents, semantic search, RAG)
  - name: media
    description: Local media generation (image / audio / video) — Tier 1 deterministic stubs
  - name: comm
    description: Connected accounts, email, calendar, VoIP, contacts, outreach
paths:
  /healthz:
    get:
      operationId: healthCheckLegacy
      tags:
        - health
      summary: Legacy health probe (kept for back-compat)
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"
  /health:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health probe
      description: |
        Returns server health status. Always responds 200; payload reports
        the running version and the current server time so callers can detect
        clock skew.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"
  /admin/tenant-data:
    get:
      operationId: exportTenantData
      tags:
        - admin
      summary: Export the requesting tenant's data (GDPR portability)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Tenant data snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantDataExportResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    delete:
      operationId: eraseTenantData
      tags:
        - admin
      summary: Erase the requesting tenant's data (GDPR erasure)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Erasure scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantErasureResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /auth/register:
    post:
      operationId: registerUser
      tags:
        - auth
      summary: Bootstrap a new tenant + owner user
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: User created and signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
  /auth/login:
    post:
      operationId: loginUser
      tags:
        - auth
      summary: Sign in with email + password
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in; session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /auth/logout:
    post:
      operationId: logoutUser
      tags:
        - auth
      summary: Destroy the current session
      responses:
        "200":
          description: Session destroyed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLogoutResponse"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags:
        - auth
      summary: Return the signed-in user (singleton)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /models:
    get:
      operationId: listModels
      tags:
        - models
      summary: List Ollama models known to this installation
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Models page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelListResponse"
  /models/pull:
    post:
      operationId: pullModel
      tags:
        - models
      summary: Schedule download of a named model
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelPullRequest"
      responses:
        "200":
          description: Pull scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelPullResponse"
  /models/{name}:
    get:
      operationId: getModel
      tags:
        - models
      summary: Fetch one model's status (singleton)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Model details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelGetResponse"
        "404":
          description: Unknown model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /chat:
    post:
      operationId: chat
      tags:
        - chat
      summary: Single-turn chat completion via the local Ollama model
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Assistant message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
  /agent/runs:
    get:
      operationId: listAgentRuns
      tags:
        - agent
      summary: List recent agent runs in this workspace
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Agent runs page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunListResponse"
    post:
      operationId: createAgentRun
      tags:
        - agent
      summary: Kick off a new deterministic agent run
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRunRequest"
      responses:
        "200":
          description: Agent run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResponse"
  /agent/runs/{id}:
    get:
      operationId: getAgentRun
      tags:
        - agent
      summary: Fetch one agent run by id
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResponse"
        "404":
          description: Unknown run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /agent/runs/{id}/cancel:
    post:
      operationId: cancelAgentRun
      tags:
        - agent
      summary: Cancel a running agent
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResponse"
  /agent/runs/{id}/messages:
    get:
      operationId: listAgentRunMessages
      tags:
        - agent
      summary: Conversation messages for one run
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Messages page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
  /agent/runs/{id}/tool-calls:
    get:
      operationId: listAgentRunToolCalls
      tags:
        - agent
      summary: Tool calls executed inside one run
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Tool calls page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCallListResponse"
  /agent/runs/{id}/approvals:
    get:
      operationId: listAgentRunApprovals
      tags:
        - agent
      summary: Approval gates for one run
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Approvals page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"
  /agent/approvals/{id}/decide:
    post:
      operationId: decideApproval
      tags:
        - agent
      summary: Approve or deny a pending approval gate
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResponse"
  /tools:
    get:
      operationId: listTools
      tags:
        - tools
      summary: List installed tools
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Tools page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolListResponse"
  /tools/{name}/invoke:
    post:
      operationId: invokeTool
      tags:
        - tools
      summary: Directly invoke a tool (outside an agent run)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolInvokeRequest"
      responses:
        "200":
          description: Tool output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolInvokeResponse"
  /privacy/events:
    get:
      operationId: listPrivacyEvents
      tags:
        - privacy
      summary: Browse the privacy-event audit log
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Privacy events page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyEventListResponse"
    post:
      operationId: createPrivacyEvent
      tags:
        - privacy
      summary: Manually log a privacy event
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrivacyEventRequest"
      responses:
        "200":
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyEventResponse"
  /notifications:
    get:
      operationId: listNotifications
      tags:
        - notifications
      summary: List in-app notifications (newest first)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
    post:
      operationId: createNotification
      tags:
        - notifications
      summary: Create a notification
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationRequest"
      responses:
        "200":
          description: Notification created (or null when suppressed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationCreateResponse"
  /notifications/unread-count:
    get:
      operationId: getNotificationUnreadCount
      tags:
        - notifications
      summary: Bell-badge unread count
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationUnreadCountResponse"
  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags:
        - notifications
      summary: Mark a single notification as read
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"
  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags:
        - notifications
      summary: Mark every unread notification as read
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Updated count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationBulkUpdateResponse"
  /notifications/clear:
    post:
      operationId: clearNotifications
      tags:
        - notifications
      summary: Delete every notification (with confirmation in UI)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Deleted count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationBulkDeleteResponse"
  /notifications/preferences:
    get:
      operationId: getNotificationPreferences
      tags:
        - notifications
      summary: Per-category notification preferences
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferencesResponse"
    put:
      operationId: updateNotificationPreferences
      tags:
        - notifications
      summary: Update notification preferences
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferencesUpdateRequest"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferencesResponse"
  /notifications/dispatch-claim:
    post:
      operationId: claimNotificationDispatch
      tags:
        - notifications
      summary: Atomically claim undispatched rows for native OS dispatch
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Newly-claimed notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationClaimResponse"
  /activity/events:
    get:
      operationId: listActivityEvents
      tags:
        - activity
      summary: Paginated activity feed
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: agent
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: fromMs
          in: query
          required: false
          schema:
            type: integer
        - name: toMs
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Activity events page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityEventListResponse"
    post:
      operationId: recordActivityEvent
      tags:
        - activity
      summary: Append an activity event
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityEventRequest"
      responses:
        "200":
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityEventResponse"
  /activity/events/{id}:
    get:
      operationId: getActivityEvent
      tags:
        - activity
      summary: Lookup a single activity event
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activity event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityEventResponse"
  /agent/approvals:
    get:
      operationId: listAgentApprovals
      tags:
        - agent
      summary: List approvals across all runs
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: decision
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - approved
              - denied
      responses:
        "200":
          description: Approvals page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"
  /agent/approvals/decide-batch:
    post:
      operationId: batchDecideApprovals
      tags:
        - agent
      summary: Approve or deny multiple pending approvals at once
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalBatchDecideRequest"
      responses:
        "200":
          description: Batch decision result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalBatchDecideResponse"
  /memory:
    get:
      operationId: listMemories
      tags:
        - memory
      summary: List long-lived user memories
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Memories page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryListResponse"
    post:
      operationId: createMemory
      tags:
        - memory
      summary: Create a memory entry
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryRequest"
      responses:
        "200":
          description: Memory created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
  /memory/{id}:
    get:
      operationId: getMemory
      tags:
        - memory
      summary: Fetch one memory (singleton)
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Memory entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
        "404":
          description: Unknown memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    delete:
      operationId: deleteMemory
      tags:
        - memory
      summary: Delete a memory entry
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deletion receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryDeleteResponse"
  /files/list:
    get:
      operationId: listFiles
      tags:
        - files
      summary: List entries inside the workspace sandbox
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: path
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Files page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"
  /files/read:
    post:
      operationId: readFile
      tags:
        - files
      summary: Read a sandboxed file
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileReadRequest"
      responses:
        "200":
          description: File contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileReadResponse"
  /files/write:
    post:
      operationId: writeFile
      tags:
        - files
      summary: Write a sandboxed file
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileWriteRequest"
      responses:
        "200":
          description: Write receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileWriteResponse"
  /files/delete:
    post:
      operationId: deleteFile
      tags:
        - files
      summary: Delete a sandboxed file
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileDeleteRequest"
      responses:
        "200":
          description: Delete receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileDeleteResponse"
  /models/hardware:
    get:
      operationId: getModelsHardware
      tags:
        - models
      summary: Detected host hardware + min-spec verdict
      description: |
        Returns the cached hardware probe alongside the recommendation
        engine's `ModelInstallPlan` (or `null` when no model fits) and the
        minimum-spec verdict that drives the min-spec onboarding screen.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Hardware snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelHardwareResponse"
  /models/hardware/redetect:
    post:
      operationId: redetectHardware
      tags:
        - models
      summary: Force re-detection of host hardware (clears the cache)
      description: |
        Drops the in-memory + on-disk hardware snapshot and re-runs detection.
        Used by the Settings "Re-detect hardware" action after a user upgrades
        RAM, swaps machines, or otherwise changes their host. Returns the same
        payload shape as `GET /models/hardware` so the caller can re-render
        immediately without a follow-up request.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Re-detected hardware + new plan + min-spec verdict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelHardwareResponse"
        "404":
          description: Feature disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /models/catalogue:
    get:
      operationId: getModelsCatalogue
      tags:
        - models
      summary: Full catalogue of primary + vision models known to the runtime
      description: |
        Static, data-driven list backing the onboarding chooser and the
        Settings model-swap UI. Adding a model is a one-entry edit in
        `services/hardware/catalogue.ts` (Standard 12 — config as data).
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Model catalogue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelCatalogueResponse"
  /models/recommended:
    get:
      operationId: getModelsRecommended
      tags:
        - models
      summary: Recommendation plan + persisted user preferences
      description: |
        Hardware-aware recommendation: detected host, install plan (primary
        + bundled vision companion + alternatives), the min-spec verdict, and
        the persisted user preferences (or sane defaults when the user has
        not made an explicit choice yet).
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Recommendation view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelRecommendationResponse"
  /models/select:
    post:
      operationId: selectModel
      tags:
        - models
      summary: Persist the user's primary model + optional vision lifecycle
      description: |
        Idempotent upsert of the per-tenant `model_preferences` row. The
        primary model id must exist in the catalogue. Vision lifecycle
        fields are optional and default to the per-tier policy from the
        recommendation engine.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectModelRequest"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelPreferencesResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /models/install:
    post:
      operationId: installModels
      tags:
        - models
      summary: Kick off the bundled primary + vision install
      description: |
        Starts (or resumes) an install for the chosen primary model plus
        the bundled vision companion (Moondream 2 by default). Returns
        the current `ModelInstallState` envelope; the actual `ollama
        pull` runs in the background. Clients should poll
        `GET /models/install/status` until `status` reaches `completed`
        or `failed`. POSTing again while a run is `running` is a no-op
        — the existing state is returned without starting a duplicate.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallModelsRequest"
      responses:
        "202":
          description: Install scheduled (or already running)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelInstallStateResponse"
        "400":
          description: Invalid payload or unknown model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /models/install/status:
    get:
      operationId: getModelsInstallStatus
      tags:
        - models
      summary: Per-tenant install state for polling
      description: |
        Returns the current install state for the requesting tenant.
        When no install has ever been started the envelope reports
        `status: "idle"` with an empty `models` array — callers should
        treat this as "not started" rather than an error.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Install state envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelInstallStateResponse"
  /onboarding/profile:
    get:
      operationId: getOnboardingProfile
      tags:
        - onboarding
      summary: Fetch the tenant's onboarding profile (singleton)
      description: |
        Returns the persisted setup-wizard answers, completion flags, and
        hardware snapshot for the requesting tenant. The frontend uses this
        on every cold start to decide whether to render the wizard or drop
        the user straight into chat.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Onboarding profile (or absent envelope when wizard not started)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProfileResponse"
    put:
      operationId: upsertOnboardingProfile
      tags:
        - onboarding
      summary: Create or update the wizard answers for the requesting tenant
      description: |
        Idempotent upsert keyed on tenant. Wizard step transitions PATCH a
        subset of fields here; the server never overwrites a flag that has
        already flipped to `true` (e.g. `firstTaskCompleted` is monotonic).
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertOnboardingProfileRequest"
      responses:
        "200":
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProfileResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /onboarding/hardware:
    get:
      operationId: getOnboardingHardware
      tags:
        - onboarding
      summary: Detect host hardware and recommend a model
      description: |
        Probes the host's RAM, CPU architecture, OS, core count, and
        Apple-Silicon flag, then returns the best-fit Ollama model from a
        data-driven catalogue. Honours `OMNINITY_HARDWARE_OVERRIDE` for
        deterministic tests.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Hardware probe + recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingHardwareResponse"
  /onboarding/starter-tasks:
    get:
      operationId: getOnboardingStarterTasks
      tags:
        - onboarding
      summary: Personalised starter-task chips for the chat surface
      description: |
        Returns three suggested first tasks tailored to the use case the
        user picked during onboarding. Falls back to a generic productivity
        bundle when no profile exists.
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      responses:
        "200":
          description: Starter-task chips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStarterTaskResponse"
  /updates/check:
    get:
      operationId: checkForUpdates
      tags:
        - updates
      summary: Compare the running build to the published latest version
      description: |
        Local-first: the desktop shell calls this on launch and the chat
