        - tenantId
        - primaryModel
        - visionLifecycle
        - catalogueChoiceMade
        - createdAt
        - updatedAt
      properties:
        tenantId:
          type: string
        primaryModel:
          type: string
          nullable: true
        visionLifecycle:
          $ref: "#/components/schemas/VisionModelLifecycleConfig"
        catalogueChoiceMade:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ModelPreferencesResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/ModelPreferences"

    SelectModelRequest:
      type: object
      required: [primaryModel]
      properties:
        primaryModel:
          type: string
          minLength: 1
          maxLength: 200
        visionLifecycleMode:
          type: string
          enum: [aggressive, balanced, warm]
        visionIdleTimeoutMs:
          type: integer
          minimum: 0
          maximum: 86400000

    OnboardingHardware:
      type: object
      required: [hardware, recommendation]
      properties:
        hardware:
          $ref: "#/components/schemas/HardwareProfile"
        recommendation:
          $ref: "#/components/schemas/ModelRecommendation"

    OnboardingHardwareResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/OnboardingHardware"

    StarterTask:
      type: object
      required: [id, title, prompt]
      properties:
        id:
          type: string
        title:
          type: string
        prompt:
          type: string
        category:
          type: string

    OnboardingStarterTaskList:
      type: object
      required: [items, useCase]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/StarterTask"
        useCase:
          type: string

    OnboardingStarterTaskResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/OnboardingStarterTaskList"

    UpdateCheck:
      type: object
      required: [currentVersion, latestVersion, updateAvailable, channel, checkedAt]
      properties:
        currentVersion:
          type: string
        latestVersion:
          type: string
        updateAvailable:
          type: boolean
        channel:
          type: string
          description: Release channel — `stable`, `beta`, etc.
        downloadUrl:
          type: string
          nullable: true
        releaseNotes:
          type: string
          nullable: true
        checkedAt:
          type: string
          format: date-time

    UpdateCheckResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/UpdateCheck"

    BrowserScreenshotRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        viewport:
          type: string

    BrowserExtractRequest:
      type: object
      required: [url, selector]
      properties:
        url:
          type: string
          format: uri
        selector:
          type: string

    BrowserActionReceipt:
      type: object
      required: [status, scheduledAt]
      properties:
        status:
          type: string
        scheduledAt:
          type: string
          format: date-time
        detail:
          type: string

    BrowserActionResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/BrowserActionReceipt"
