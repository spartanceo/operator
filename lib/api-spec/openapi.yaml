  /telemetry/consent:
    get:
      operationId: getTelemetryConsent
      tags:
        - telemetry
      summary: Read the tenant's opt-in consent flags
      description: |
        Returns the singleton consent row for the requesting tenant. If
        the user has not interacted with the consent UI yet, every flag
        is `false` (default-OFF) and `consentGivenAt` is `null`.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Current consent state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptInTelemetryConsentResponse'
    put:
      operationId: updateTelemetryConsent
      tags:
        - telemetry
      summary: Update opt-in flags for the requesting tenant
      description: |
        Idempotent upsert. Each flag may be omitted (left unchanged), set
        to `true` (opt in), or set to `false` (opt out). Pass
        `revokeAll: true` to force every flag off and stamp
        `consentRevokedAt`.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTelemetryConsentRequest'
      responses:
        '200':
          description: Consent saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptInTelemetryConsentResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /telemetry/data:
    delete:
      operationId: eraseTelemetryData
      tags:
        - telemetry
      summary: Hard-delete every telemetry artefact owned by this tenant
      description: |
        Removes the consent row, every recorded event, and every crash
        report for the requesting tenant. Idempotent — safe to call
        repeatedly. Used by the "Delete my telemetry data" button in the
        Settings UI and by the wider GDPR erasure flow.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Erasure receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryErasureResponse'
  /telemetry/events:
    get:
      operationId: listTelemetryEvents
      tags:
        - telemetry
      summary: Paginated list of recorded telemetry events
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum:
              - feature_usage
              - performance
              - onboarding
              - marketplace
      responses:
        '200':
          description: Telemetry events page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryEventListResponse'
    post:
      operationId: recordTelemetryEvents
      tags:
        - telemetry
      summary: Submit a batch of telemetry events
      description: |
        Each event in the batch is independently validated against the
        per-category opt-in flag and the privacy enforcement layer. Events
        that fail either gate appear in the `rejections` array of the
        response — the call as a whole returns 200 even when some events
        were rejected so a client batch is never silently dropped.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordTelemetryEventsRequest'
      responses:
        '200':
          description: Batch result (mix of accepted + rejected)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordTelemetryEventsResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /telemetry/crashes:
    get:
      operationId: listCrashReports
      tags:
        - telemetry
      summary: Paginated list of submitted crash reports
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Crash reports page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrashReportListResponse'
    post:
      operationId: submitCrashReport
      tags:
        - telemetry
      summary: Submit one user-reviewed crash report
      description: |
        The user reviews the locally generated crash report and only then
        does the desktop app POST it here. Returns `403
        TELEMETRY_CONSENT_DENIED` when crash reporting is not opted-in.
        Stack traces and breadcrumbs are scrubbed of file paths, email
        addresses, URL credentials, and token-like blobs server-side.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitCrashReportRequest'
      responses:
        '200':
          description: Crash report stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrashReportResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Crash reporting opt-in is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /telemetry/summary:
    get:
      operationId: getTelemetrySummary
      tags:
        - telemetry
      summary: Per-tenant analytics summary for the OP team dashboard
      description: |
        Aggregates the tenant's recorded telemetry events and crash
        reports into the metrics the dashboard surfaces — totals, unique
        anonymous IDs (proxy for active users), category counts,
        top-N event names, hardware tier distribution, and the onboarding
        funnel by named step. Cross-tenant aggregation is gated behind
        the privileged admin role that lands in Task #7.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Aggregated dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetrySummaryResponse'
