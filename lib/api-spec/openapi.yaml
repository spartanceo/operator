  /undo/tasks/{taskId}/undo:
    post:
      operationId: undoTask
      tags:
        - undo
      summary: Reverse every reversible action belonging to a task
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UndoTaskRequest'
      responses:
        '200':
          description: Task reversed (full + partial outcomes both 200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UndoTaskResponse'
        '409':
          description: Confirmation flag missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /tasks/{id}/priority:
    post:
      operationId: setQueuedTaskPriority
      tags:
        - tasks
